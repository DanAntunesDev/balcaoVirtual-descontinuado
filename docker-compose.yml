version: "3.9"

services:
  web:
    build: .
    container_name: balcao_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: balcao_redis
    ports:
      - "6379:6379"

  celery:
    build: .
    command: celery -A core worker -l info
    depends_on:
      - redis
      - web
    env_file:
      - .env