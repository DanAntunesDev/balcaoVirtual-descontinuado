<!doctype html>
<html lang="pt-br">
<head><meta charset="utf-8" /></head>
<body style="margin:0;background:#f6f7fb;font-family:Arial,Helvetica,sans-serif;color:#111827;">
  <div style="max-width:640px;margin:0 auto;padding:24px;">
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;">
      <div style="padding:18px 20px;border-bottom:1px solid #eef2f7;display:flex;align-items:center;gap:10px;">
        <div style="width:34px;height:34px;border-radius:10px;background:#dcfce7;display:flex;align-items:center;justify-content:center;color:#166534;">
          <strong style="font-size:18px;">OK</strong>
        </div>
        <div style="font-weight:900;letter-spacing:0.10em;text-transform:uppercase;font-size:12px;">Balcão Virtual</div>
      </div>

      <div style="padding:20px;">
        <h1 style="margin:0 0 8px;font-size:20px;">Troca de senha efetuada com sucesso</h1>
        <p style="margin:0 0 14px;line-height:1.5;color:#374151;">Olá, <strong>{{ user_name }}</strong>.</p>

        <div style="padding:12px 14px;border:1px solid #eef2f7;border-radius:14px;background:#fafafa;">
          <div style="font-size:11px;color:#6b7280;font-weight:900;text-transform:uppercase;letter-spacing:0.12em;">Quando</div>
          <div style="margin-top:6px;font-size:14px;font-weight:900;color:#111827;">{{ when|date:"d/m/Y H:i" }}</div>
        </div>

        <p style="margin:14px 0 0;line-height:1.5;color:#374151;">
          Se você não realizou essa alteração, recomendamos trocar sua senha novamente e contatar o suporte.
        </p>
      </div>

      <div style="padding:14px 20px;border-top:1px solid #eef2f7;color:#9ca3af;font-size:11px;text-align:center;">
        Mensagem automática do Balcão Virtual.
      </div>
    </div>
  </div>
</body>
</html>
